# ============================================================
# Daily TMDB News Aggregation
#
# Fetches trending movies from TMDB and inserts them as
# published, aggregated posts. Runs daily at 6:00 AM UTC.
#
# Setup:
#   1. Add the following Secrets to your GitHub repo:
#      - TMDB_API_KEY        (from themoviedb.org)
#      - SUPABASE_URL        (https://pmuxatajrcbcmcadgvmy.supabase.co)
#      - SUPABASE_SERVICE_ROLE_KEY
#   2. This workflow will run automatically on schedule.
#
# To trigger manually: Go to Actions > Daily TMDB Seed > Run workflow
# ============================================================
name: Daily TMDB Seed

on:
  schedule:
    # Every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  seed-tmdb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run daily TMDB seed (insert only, no deletion)
        run: npx tsx scripts/daily-tmdb-seed.ts
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
